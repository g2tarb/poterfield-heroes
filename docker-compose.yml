# Porterfield Heroes — local dev infrastructure.
# Lance: pnpm docker:up

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ph_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ph
      POSTGRES_PASSWORD: ph_dev
      POSTGRES_DB: porterfield
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ph_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ph -d porterfield"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ph_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ph_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ph_pg_data:
  ph_redis_data:
